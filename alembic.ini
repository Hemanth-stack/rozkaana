[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file within a transaction,
# and to 'false' to run the environment file without a transaction.
# transaction_per_migration = false

# set to 'true' to allow .pyc and .pyo files without a source
# .py file to be detected as imports in 'autogenerate' mode.
# this is a Python 2.6+ feature.
# sourceless = false

# version path separator; default to os.altsep
# version_path_separator = os

# set to 'true' to search for the repository .ini file
# in the parent directory instead of the directory
# where the command was invoked
# search_parent_directories = false

# revision environment configuration
# [post_write_hooks]
# update module docstring, e.g. 'Updated documentation for revisions xyz'
# hooks = update_module_docstring
# update_module_docstring.type = exec
# update_module_docstring.executable = python
# update_module_docstring.script = scripts/update_module_docstring.py

[tool:alembic]
# migrations_path = %(here)s/migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S