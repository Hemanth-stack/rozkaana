version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rozkaana
      POSTGRES_USER: rozkaana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rozkaana"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-rozkaana}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "7070:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./about.html:/usr/share/nginx/html/about.html:ro
      - ./help.html:/usr/share/nginx/html/help.html:ro
      - ./privacy.html:/usr/share/nginx/html/privacy.html:ro
      - ./terms.html:/usr/share/nginx/html/terms.html:ro
      - ./refund.html:/usr/share/nginx/html/refund.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./dev.html:/usr/share/nginx/html/dev.html:ro
      - ./auth-success.html:/usr/share/nginx/html/auth-success.html:ro
      - ./onboard.html:/usr/share/nginx/html/onboard.html:ro
      - ./app.html:/usr/share/nginx/html/app.html:ro
      - ./settings.html:/usr/share/nginx/html/settings.html:ro
      - ./billing.html:/usr/share/nginx/html/billing.html:ro
      - ./history.html:/usr/share/nginx/html/history.html:ro
      - ./household.html:/usr/share/nginx/html/household.html:ro
      - ./join.html:/usr/share/nginx/html/join.html:ro
      - ./robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ./sitemap.xml:/usr/share/nginx/html/sitemap.xml:ro
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql+asyncpg://rozkaana:password@postgres:5432/rozkaana
      DATABASE_URL_SYNC: postgresql+psycopg2://rozkaana:password@postgres:5432/rozkaana
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-rozkaana}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET_NAME: rozkaana-pdfs
      MINIO_SECURE: "false"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
