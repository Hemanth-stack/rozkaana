server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    root /usr/share/nginx/html;
    charset utf-8;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Admin panel (clean URL only — /admin.html is not exposed)
    location = /admin {
        try_files /admin.html =404;
    }

    # Dev chat console (clean URL only — /dev.html is not exposed)
    location = /dev {
        try_files /dev.html =404;
    }

    # Google OAuth success redirect handler
    location = /auth/success {
        try_files /auth-success.html =404;
    }

    # User onboarding wizard
    location = /onboard {
        try_files /onboard.html =404;
    }

    # User app / dashboard
    location = /app {
        try_files /app.html =404;
    }

    # Settings page
    location = /settings {
        try_files /settings.html =404;
    }

    # Billing & subscription page
    location = /billing {
        try_files /billing.html =404;
    }

    # Meal history page
    location = /history {
        try_files /history.html =404;
    }

    # Household page
    location = /household {
        try_files /household.html =404;
    }

    # Household invite join page
    location ~ ^/join/ {
        try_files /join.html =404;
    }

    # About Us
    location = /about {
        try_files /about.html =404;
    }

    # Help Center
    location = /help {
        try_files /help.html =404;
    }

    # Privacy Policy
    location = /privacy {
        try_files /privacy.html =404;
    }

    # Terms of Service
    location = /terms {
        try_files /terms.html =404;
    }

    # Refund Policy
    location = /refund {
        try_files /refund.html =404;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block everything else
    location / {
        return 404;
    }
}
