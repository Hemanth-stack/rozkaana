server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Admin panel
    location = /admin {
        try_files /admin.html =404;
    }
    location = /admin.html {
        try_files /admin.html =404;
    }

    # Dev chat console
    location = /dev {
        try_files /dev.html =404;
    }
    location = /dev.html {
        try_files /dev.html =404;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block everything else
    location / {
        return 404;
    }
}
