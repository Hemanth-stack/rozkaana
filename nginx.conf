server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    server_tokens off;

    root /usr/share/nginx/html;
    charset utf-8;

    # ── Crawler / bot essentials ──────────────────────────────────────────────

    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files /sitemap.xml =404;
    }

    # Favicon — return empty 204 so bots don't log a 404 error
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # ── Public marketing & legal pages ───────────────────────────────────────
    # Access-Control-Allow-Origin * lets AI tools and browser extensions fetch
    # these pages cross-origin. X-Robots-Tag makes the allow-crawl intent
    # explicit at the HTTP layer (supplements the HTML meta tag).

    location = / {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=300" always;
        try_files /index.html =404;
    }

    location = /about {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=300" always;
        try_files /about.html =404;
    }

    location = /help {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=300" always;
        try_files /help.html =404;
    }

    location = /privacy {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=3600" always;
        try_files /privacy.html =404;
    }

    location = /terms {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=3600" always;
        try_files /terms.html =404;
    }

    location = /refund {
        add_header X-Robots-Tag           "index, follow" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Cache-Control          "public, max-age=3600" always;
        try_files /refund.html =404;
    }

    # ── Authenticated app pages (no public crawl) ─────────────────────────────

    location = /admin {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /admin.html =404;
    }

    location = /dev {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /dev.html =404;
    }

    location = /auth/success {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /auth-success.html =404;
    }

    location = /onboard {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /onboard.html =404;
    }

    location = /app {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /app.html =404;
    }

    location = /settings {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /settings.html =404;
    }

    location = /billing {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /billing.html =404;
    }

    location = /history {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /history.html =404;
    }

    location = /household {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /household.html =404;
    }

    location ~ ^/join/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /join.html =404;
    }

    # ── Static assets ─────────────────────────────────────────────────────────

    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Block everything else ─────────────────────────────────────────────────

    location / {
        return 404;
    }
}
