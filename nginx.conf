server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    root /usr/share/nginx/html;
    charset utf-8;

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Admin panel
    location = /admin {
        try_files /admin.html =404;
    }
    location = /admin.html {
        try_files /admin.html =404;
    }

    # Dev chat console
    location = /dev {
        try_files /dev.html =404;
    }
    location = /dev.html {
        try_files /dev.html =404;
    }

    # Google OAuth success redirect handler
    location = /auth/success {
        try_files /auth-success.html =404;
    }

    # User onboarding wizard
    location = /onboard {
        try_files /onboard.html =404;
    }

    # User app / dashboard
    location = /app {
        try_files /app.html =404;
    }

    # Settings page
    location = /settings {
        try_files /settings.html =404;
    }

    # Billing & subscription page
    location = /billing {
        try_files /billing.html =404;
    }

    # Meal history page
    location = /history {
        try_files /history.html =404;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block everything else
    location / {
        return 404;
    }
}
